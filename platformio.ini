; PlatformIO Project Configuration File
; PristonChess — based on OpenChess. UI is web-only; the original
; Waveshare 2.13" e-Paper add-on was removed (no display hardware).

[env:nodemcu-32s]
platform = espressif32
board = nodemcu-32s
framework = arduino
monitor_speed = 115200
upload_speed = 115200
board_build.filesystem = littlefs
board_build.partitions = min_spiffs_nocore.csv
extra_scripts =
	pre:src/web/build/minify.py
	pre:src/web/build/prepare_littlefs.py
	src/web/build/upload_fs.py
lib_deps =
	makuna/NeoPixelBus@^2.8.4
	bblanchon/ArduinoJson@^7.4.3
	esp32async/AsyncTCP@^3.4.10
	esp32async/ESPAsyncWebServer@^3.10.1
lib_ignore =
	ESPAsyncTCP
	RPAsyncTCP
lib_ldf_mode = deep
build_flags =
	; Skip the blocking "empty board" calibration step when entering a
	; sensor-based mode. Remove this once real Hall sensors + shift register
	; are wired up — until then the firmware would hang waiting for the
	; floating row pins to read all-empty.
	; -DSKIP_CALIBRATION=1
	; -DSIMULATION_MODE=1   ; uncomment to auto-start the scripted demo at boot

