<!doctype html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#0f1115">
    <link rel="manifest" href="./manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="PristonChess">
    <title>PristonChess — Spielmodus</title>
    <link rel="icon" type="image/svg+xml" href="./favicon.svg">
    <link rel="stylesheet" href="./css/styles.css">
    <style>
        /* "Erweitert" disclosure — keeps dev-only modes (Sensor-Test,
           Simulation) hidden until explicitly expanded. */
        .advanced-modes {
            margin-top: var(--space-4);
            border-top: 1px dashed var(--color-border);
            padding-top: var(--space-4);
        }
        .advanced-modes summary {
            list-style: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: var(--space-2);
            padding: var(--space-2) var(--space-3);
            color: var(--color-text-muted);
            font-size: var(--fs-sm);
            border-radius: var(--radius-md);
            transition: background var(--duration-1) var(--easing);
        }
        .advanced-modes summary::-webkit-details-marker { display: none; }
        .advanced-modes summary:hover { background: var(--color-bg-elev-2); }
        .advanced-modes summary::after {
            content: "›";
            margin-left: auto;
            transition: transform var(--duration-1) var(--easing);
            font-size: var(--fs-md);
        }
        .advanced-modes[open] summary::after { transform: rotate(90deg); }
        .advanced-modes .adv-icon { font-size: var(--fs-md); }
        .advanced-modes .adv-label {
            font-weight: 600;
            color: var(--color-text);
            text-transform: uppercase;
            letter-spacing: 0.04em;
            font-size: var(--fs-xs);
        }
        .advanced-modes .adv-hint {
            color: var(--color-text-subtle);
            font-size: var(--fs-xs);
        }
        .advanced-modes-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: var(--space-2);
            margin-top: var(--space-3);
        }
        .adv-mode-tile {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 4px;
            padding: var(--space-3) var(--space-4);
            background: var(--color-bg-elev-2);
            border: 1px dashed var(--color-border);
            border-radius: var(--radius-md);
            color: var(--color-text);
            cursor: pointer;
            text-align: left;
            transition: background var(--duration-1) var(--easing),
                        border-color var(--duration-1) var(--easing);
        }
        .adv-mode-tile:hover {
            background: var(--color-bg-elev-3);
            border-color: var(--color-text-subtle);
        }
        .adv-mode-tile .adv-mode-title {
            font-weight: 600;
            font-size: var(--fs-sm);
        }
        .adv-mode-tile .adv-mode-desc {
            font-size: 10px;
            color: var(--color-text-muted);
        }

        /* Player selection tiles in the HvH modal — full-width radio
           buttons styled like the toggle-btn group. Single dense column
           inside each P1/P2 picker; the two pickers sit side-by-side. */
        .player-radio-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 4px;
            max-height: 180px;
            overflow-y: auto;
        }
        .player-radio-tile {
            display: flex;
            align-items: center;
            gap: var(--space-2);
            padding: 5px 8px;
            background: var(--color-bg-elev-2);
            border: 1px solid var(--color-border);
            border-radius: var(--radius-md, 8px);
            cursor: pointer;
            user-select: none;
            transition: background 120ms, border-color 120ms;
        }
        .player-radio-tile:hover {
            background: var(--color-bg-elev-3);
        }
        .player-radio-tile input[type="radio"] {
            position: absolute;
            opacity: 0;
            pointer-events: none;
        }
        .player-radio-tile.active {
            background: var(--color-accent-bg, rgba(240,192,64,0.12));
            border-color: var(--color-accent, #f0c040);
        }
        .player-radio-tile .pr-avatar {
            width: 22px; height: 22px;
            display: inline-flex;
            align-items: center; justify-content: center;
            font-size: 13px;
            border-radius: 50%;
            background: var(--color-bg-elev-3);
            flex-shrink: 0;
        }
        /* Shared "start game" modal — fullscreen on phones, generous on
           desktop. Applies to both #hvhModal and #botModal so the start
           flow feels consistent. */
        #hvhModal .modal-box,
        #botModal .modal-box {
            max-width: min(720px, 96vw);
            width: 100%;
            max-height: calc(100dvh - 16px);
            padding: var(--space-5);
            display: flex;
            flex-direction: column;
            gap: var(--space-4);
        }
        @media (max-width: 600px) {
            #hvhModal .modal-box,
            #botModal .modal-box {
                max-width: 100vw;
                width: 100vw;
                height: 100dvh;
                max-height: 100dvh;
                border-radius: 0;
                padding: 16px 14px 18px;
            }
        }
        #hvhModal .modal-box h3,
        #botModal .modal-box h3 {
            margin: 0;
            font-size: 20px;
            font-weight: 700;
        }
        #hvhModal .form-group,
        #botModal .form-group { margin-bottom: 0; }
        #hvhModal .form-group > label,
        #botModal .form-group > label {
            display: block;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: var(--color-text-muted);
            margin-bottom: 8px;
        }
        .hvh-players {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: var(--space-4);
        }
        .hvh-players .form-group { margin-bottom: 0; }
        .hvh-players .player-radio-grid { max-height: none; }

        /* Bigger pills / toggle buttons so they're thumb-sized on phones. */
        #hvhModal .option-group.pills,
        #botModal .option-group { gap: 6px; flex-wrap: wrap; }
        #hvhModal .option-group.pills .toggle-btn.pill,
        #botModal .option-group .toggle-btn {
            flex: 1 1 calc(33% - 6px);
            min-width: 70px;
            padding: 12px 14px;
            font-size: 14px;
            font-weight: 500;
        }

        /* Primary player picker — the focus of the "Neues Spiel" modal. */
        .hvh-primary-label {
            font-size: 13px !important;
            color: var(--color-text) !important;
            font-weight: 700 !important;
            letter-spacing: 0 !important;
            text-transform: none !important;
        }
        /* Secondary block (time / side) — visually subordinate to the players:
           a divider, muted labels and smaller pills. */
        .hvh-secondary {
            border-top: 1px solid var(--color-border);
            padding-top: var(--space-3);
            display: flex;
            flex-direction: column;
            gap: var(--space-3);
            opacity: 0.9;
        }
        .hvh-secondary > .form-group > label {
            font-size: 10.5px;
            color: var(--color-text-muted);
            margin-bottom: 6px;
        }
        #hvhModal .hvh-secondary .option-group.pills .toggle-btn.pill {
            flex: 1 1 calc(20% - 6px);
            min-width: 52px;
            padding: 8px 10px;
            font-size: 12.5px;
            font-weight: 500;
        }

        /* Wizard steps: revealed one after another with a slide/fade-in. */
        #hvhModal .modal-box { overflow-y: auto; }
        .hvh-step { display: none; }
        .hvh-step.revealed { display: block; animation: hvhStepIn 340ms cubic-bezier(.2,.7,.2,1) both; }
        @keyframes hvhStepIn {
            from { opacity: 0; transform: translateY(16px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .hvh-step + .hvh-step.revealed { margin-top: 14px; }
        .hvh-step-label {
            display: block;
            font-size: 13px;
            font-weight: 700;
            color: var(--color-text);
            margin: 2px 0 8px;
        }
        /* Big, TALL player buttons — easy to tap on mobile. */
        #hvhModal .player-radio-grid.hvh-big { gap: 10px; max-height: 46vh; overflow-y: auto; }
        #hvhModal .hvh-big .player-radio-tile {
            padding: 18px 16px; min-height: 64px; font-size: 16px; border-radius: 12px;
        }
        #hvhModal .hvh-big .player-radio-tile .pr-avatar { width: 36px; height: 36px; font-size: 18px; }

        /* Collapsed picker: the chosen player shrinks to a compact chip at the top,
           the full grid + big label hide, and step 2 spawns directly below. */
        .hvh-summary {
            display: none;
            align-items: center;
            gap: 10px;
            padding: 7px 12px;
            background: var(--color-bg-elev-2);
            border: 1px solid var(--color-accent, #f0c040);
            border-radius: 9px;
            cursor: pointer;
        }
        .hvh-summary .pr-avatar {
            width: 24px; height: 24px; border-radius: 50%;
            display: inline-flex; align-items: center; justify-content: center; flex-shrink: 0;
        }
        .hvh-summary-name { font-weight: 700; flex: 1; font-size: 14px; }
        .hvh-summary-edit { font-size: 11px; color: var(--color-text-muted); }
        .hvh-step.collapsed .player-radio-grid { display: none; }
        .hvh-step.collapsed .hvh-summary { display: flex; }
        .hvh-step.collapsed .hvh-step-label { font-size: 10px; opacity: 0.65; margin-bottom: 4px; }
        .hvh-step.collapsed { margin-top: 8px; }

        /* Smartphone: the player selection OWNS the screen (~70%); the time and
           side options shrink to a compact footer. The modal is a fixed flex
           column — only the two player lists scroll, never the whole modal. */
        @media (max-width: 600px) {
            #hvhModal .modal-box {
                gap: 10px;
                overflow: hidden;
            }
            #hvhModal .modal-box h3 { flex: 0 0 auto; font-size: 18px; }
            #hvhModal .hvh-players {
                flex: 1 1 auto;
                min-height: 0;
                gap: 10px;
            }
            #hvhModal .hvh-players .form-group {
                display: flex;
                flex-direction: column;
                min-height: 0;
            }
            #hvhModal .hvh-players .player-radio-grid {
                flex: 1 1 auto;
                min-height: 0;
                max-height: none;
                overflow-y: auto;
                gap: 8px;
                align-content: start;
            }
            #hvhModal .player-radio-tile {
                padding: 14px 12px;
                font-size: 15px;
                border-radius: 12px;
            }
            #hvhModal .player-radio-tile .pr-avatar {
                width: 30px; height: 30px; font-size: 16px;
            }
            #hvhModal .hvh-primary-label {
                font-size: 12px !important;
                margin-bottom: 6px;
            }
            /* Compact footer for the subordinate options. */
            #hvhModal .hvh-secondary {
                flex: 0 0 auto;
                padding-top: 10px;
                gap: 8px;
            }
            #hvhModal .hvh-secondary > .form-group > label {
                font-size: 10px;
                margin-bottom: 4px;
            }
            #hvhModal .hvh-secondary .option-group.pills { gap: 4px; }
            #hvhModal .hvh-secondary .option-group.pills .toggle-btn.pill {
                flex: 1 1 0;
                min-width: 0;
                padding: 8px 4px;
                font-size: 11px;
            }
            #hvhModal .modal-actions { flex: 0 0 auto; padding-top: 8px; }
        }

        /* Modal action buttons — properly tappable on phones. */
        #hvhModal .modal-actions,
        #botModal .modal-actions {
            margin-top: auto;
            display: flex;
            gap: 10px;
            padding-top: var(--space-3);
        }
        #hvhModal .modal-actions .button,
        #hvhModal .modal-actions .back-button,
        #botModal .modal-actions .button,
        #botModal .modal-actions .back-button {
            padding: 14px 18px;
            font-size: 16px;
            font-weight: 600;
            min-height: 48px;
        }

        /* Per-player colour dot inside the tile — pulled from the profile. */
        .pr-colordot {
            display: inline-block;
            width: 10px; height: 10px;
            border-radius: 50%;
            margin-right: 6px;
            box-shadow: 0 0 0 1px rgba(255,255,255,0.18) inset;
            vertical-align: middle;
            flex-shrink: 0;
        }

        /* Bot modal: convert the dropdown to a tile grid (uses same .player-radio-tile styling). */
        #botModal .player-radio-grid {
            grid-template-columns: 1fr 1fr;
            max-height: 220px;
        }
        .player-radio-tile .pr-text {
            display: flex;
            flex-direction: column;
            min-width: 0;
            line-height: 1.15;
        }
        .player-radio-tile .pr-name {
            font-weight: 600;
            font-size: var(--fs-sm);
            color: var(--color-text);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .player-radio-tile .pr-meta {
            font-size: 10px;
            color: var(--color-text-muted);
            font-family: var(--font-mono);
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }
        .player-radio-tile.disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        /* ============================================================
           Game-mode hero cards — scoped to game.html so styles.css's
           more generic .game-mode rules stay intact for other surfaces.
           ============================================================ */
        .mode-hero-grid {
            display: flex;
            flex-direction: column;
            gap: var(--space-3);
            margin: var(--space-4) 0 var(--space-3);
        }
        .mode-hero {
            position: relative;
            display: grid;
            grid-template-columns: 64px 1fr auto;
            align-items: center;
            gap: var(--space-4);
            padding: 18px 18px 18px 14px;
            background:
                linear-gradient(135deg,
                    color-mix(in srgb, var(--mode-color, var(--color-accent)) 12%, transparent) 0%,
                    transparent 70%),
                var(--color-bg-elev-2);
            border: 1px solid var(--color-border);
            border-left: 3px solid var(--mode-color, var(--color-accent));
            border-radius: var(--radius-lg);
            color: var(--color-text);
            cursor: pointer;
            text-align: left;
            -webkit-tap-highlight-color: transparent;
            transition: transform 160ms var(--easing),
                        border-color 160ms var(--easing),
                        box-shadow 160ms var(--easing),
                        background 160ms var(--easing);
            overflow: hidden;
        }
        .mode-hero:hover {
            transform: translateY(-2px);
            border-color: var(--mode-color, var(--color-accent));
            box-shadow: 0 8px 24px -10px var(--mode-color, var(--color-accent));
        }
        .mode-hero:active { transform: translateY(0); }
        .mode-hero.unavailable { opacity: 0.45; cursor: not-allowed; pointer-events: none; }

        .mh-icon {
            width: 56px; height: 56px;
            border-radius: 16px;
            display: flex; align-items: center; justify-content: center;
            font-size: 28px;
            background:
                radial-gradient(circle at 30% 25%,
                    color-mix(in srgb, var(--mode-color, var(--color-accent)) 38%, transparent) 0%,
                    color-mix(in srgb, var(--mode-color, var(--color-accent)) 8%, transparent) 60%,
                    transparent 100%),
                color-mix(in srgb, var(--mode-color, var(--color-accent)) 14%, var(--color-bg-elev-3));
            border: 1px solid color-mix(in srgb, var(--mode-color, var(--color-accent)) 35%, transparent);
            box-shadow: inset 0 0 0 1px rgba(255,255,255,0.04);
        }
        .mh-body { display: flex; flex-direction: column; gap: 4px; min-width: 0; }
        .mh-title {
            margin: 0;
            font-size: 17px;
            font-weight: 700;
            color: var(--color-text);
            letter-spacing: 0.005em;
        }
        .mh-sub {
            margin: 0;
            font-size: 12.5px;
            color: var(--color-text-muted);
            line-height: 1.35;
        }
        .mh-chips {
            display: flex; flex-wrap: wrap; gap: 4px;
            margin-top: 6px;
        }
        .mh-chip {
            font-size: 10px;
            font-family: var(--font-mono);
            text-transform: uppercase;
            letter-spacing: 0.06em;
            padding: 2px 7px;
            border-radius: 99px;
            background: color-mix(in srgb, var(--mode-color, var(--color-accent)) 14%, transparent);
            color: color-mix(in srgb, var(--mode-color, var(--color-accent)) 75%, var(--color-text));
            border: 1px solid color-mix(in srgb, var(--mode-color, var(--color-accent)) 22%, transparent);
        }
        .mh-arrow {
            width: 28px; height: 28px;
            display: flex; align-items: center; justify-content: center;
            color: color-mix(in srgb, var(--mode-color, var(--color-accent)) 70%, var(--color-text-muted));
            border-radius: 50%;
            background: color-mix(in srgb, var(--mode-color, var(--color-accent)) 14%, transparent);
            font-size: 16px;
            transition: transform 160ms var(--easing), background 160ms var(--easing);
        }
        .mode-hero:hover .mh-arrow {
            transform: translateX(3px);
            background: color-mix(in srgb, var(--mode-color, var(--color-accent)) 28%, transparent);
        }

        /* Heading above the mode cards. */
        .mode-heading {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            gap: var(--space-3);
            padding: 0 2px;
        }
        .mode-heading h2 {
            margin: 0;
            font-size: 22px;
            font-weight: 700;
            letter-spacing: -0.01em;
            color: var(--color-text);
        }
        .mode-heading .mode-heading-sub {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--color-text-muted);
            font-family: var(--font-mono);
        }

        @media (max-width: 380px) {
            .mode-hero { grid-template-columns: 52px 1fr auto; gap: var(--space-3); padding: 14px 14px 14px 12px; }
            .mh-icon { width: 48px; height: 48px; font-size: 24px; border-radius: 14px; }
            .mh-title { font-size: 16px; }
            .mh-sub { font-size: 12px; }
        }
    </style>
    <script src="./scripts/app.js"></script>
</head>

<body>
    <main class="container">
        <header class="app-header">
            <a href="./index.html"
               style="text-decoration:none; color:inherit;">
                <h1 class="app-title">
                    <span class="pc-wordmark">Priston<b>Chess</b></span>
                    <span class="visually-hidden">PristonChess</span>
                </h1>
            </a>
            <div class="app-status">
                <span class="status-pill" id="modeStatusPill">Bereit</span>
            </div>
        </header>

        <div class="mode-heading">
            <h2>Spielmodus</h2>
            <span class="mode-heading-sub">Wähle deinen Gegner</span>
        </div>

        <div class="mode-hero-grid">
            <button type="button" class="mode-hero" style="--mode-color:#4D8CFF;" onclick="showHvHModal()">
                <span class="mh-icon">♟️</span>
                <span class="mh-body">
                    <span class="mh-title">Lokales Spiel</span>
                    <span class="mh-sub">Zwei Spieler am selben Brett — mit Uhr, Stats und Rangliste.</span>
                    <span class="mh-chips">
                        <span class="mh-chip">2 Spieler</span>
                        <span class="mh-chip">Ranked</span>
                    </span>
                </span>
                <span class="mh-arrow" aria-hidden="true">›</span>
            </button>

            <button type="button" class="mode-hero" style="--mode-color:#F5A623;" onclick="showBotModal()">
                <span class="mh-icon">🤖</span>
                <span class="mh-body">
                    <span class="mh-title">Bot</span>
                    <span class="mh-sub">Spiele gegen Stockfish — von Anfänger bis Großmeister.</span>
                    <span class="mh-chips">
                        <span class="mh-chip">4 Stufen</span>
                        <span class="mh-chip">Stockfish</span>
                    </span>
                </span>
                <span class="mh-arrow" aria-hidden="true">›</span>
            </button>

            <button type="button" class="mode-hero" style="--mode-color:#2ED573;" onclick="showLichessModal()">
                <span class="mh-icon">🌐</span>
                <span class="mh-body">
                    <span class="mh-title">Lichess</span>
                    <span class="mh-sub">Online-Partie mit physischem Brett — Züge spiegeln live.</span>
                    <span class="mh-chips">
                        <span class="mh-chip">Online</span>
                        <span class="mh-chip">Live</span>
                    </span>
                </span>
                <span class="mh-arrow" aria-hidden="true">›</span>
            </button>
        </div>

        <!-- Erweitert: Dev/QA-Modi (Sensor-Test, Simulation) — kollabiert. -->
        <details class="advanced-modes">
            <summary>
                <span class="adv-icon">⚙</span>
                <span class="adv-label">Erweitert</span>
                <span class="adv-hint">Sensor-Test &amp; Simulation</span>
            </summary>
            <div class="advanced-modes-grid">
                <button type="button" class="adv-mode-tile" onclick="selectGame(4)">
                    <span class="adv-mode-title">Sensor-Test</span>
                    <span class="adv-mode-desc">Hall-Sensoren am physischen Brett prüfen</span>
                </button>
                <button type="button" class="adv-mode-tile" onclick="selectGame(5)">
                    <span class="adv-mode-title">Simulation (Auto)</span>
                    <span class="adv-mode-desc">Scripted-Partie läuft automatisch ab</span>
                </button>
                <button type="button" class="adv-mode-tile" onclick="selectGame(5, {manual:true})">
                    <span class="adv-mode-title">Simulation (Manuell)</span>
                    <span class="adv-mode-desc">Figuren selbst im Web ziehen — LEDs spiegeln</span>
                </button>
            </div>
        </details>

        <!-- Human vs Human modal (player + time + color selection) -->
        <div id="hvhModal" class="modal-overlay">
            <div class="modal-box">
                <h3 style="margin-top:0;">Neues Spiel</h3>

                <!-- Step 1: pick Spieler 1 (always shown; collapses to a chip once chosen) -->
                <div class="hvh-step revealed" id="hvhStep1">
                    <label class="hvh-step-label">① Spieler 1</label>
                    <div class="hvh-summary" id="hvhP1Summary" onclick="_editPlayerStep('hvhStep1')"></div>
                    <div class="player-radio-grid hvh-big" id="hvhP1"></div>
                </div>

                <!-- Step 2: pick Spieler 2 (revealed after Spieler 1) -->
                <div class="hvh-step" id="hvhStep2">
                    <label class="hvh-step-label">② Spieler 2</label>
                    <div class="hvh-summary" id="hvhP2Summary" onclick="_editPlayerStep('hvhStep2')"></div>
                    <div class="player-radio-grid hvh-big" id="hvhP2"></div>
                </div>

                <!-- Step 3: time + side + start (revealed after Spieler 2) -->
                <div class="hvh-step" id="hvhStep3">
                    <div class="hvh-secondary">
                        <div class="form-group">
                            <label>Zeit pro Spieler</label>
                            <div class="option-group pills" id="hvhTime">
                                <button type="button" class="toggle-btn pill" data-ms="60000">1m</button>
                                <button type="button" class="toggle-btn pill" data-ms="180000">3m</button>
                                <button type="button" class="toggle-btn pill" data-ms="300000">5m</button>
                                <button type="button" class="toggle-btn pill active" data-ms="600000">10m</button>
                                <button type="button" class="toggle-btn pill" data-ms="900000">15m</button>
                                <button type="button" class="toggle-btn pill" data-ms="1800000">30m</button>
                                <button type="button" class="toggle-btn pill" data-ms="0">∞</button>
                            </div>
                        </div>
                        <div class="form-group">
                            <label>Farbe · wer beginnt</label>
                            <div class="option-group pills" id="hvhColor">
                                <button type="button" class="toggle-btn pill" data-color="white">P1 weiss</button>
                                <button type="button" class="toggle-btn pill" data-color="black">P1 schwarz</button>
                                <button type="button" class="toggle-btn pill active" data-color="random">Zufall</button>
                            </div>
                        </div>
                    </div>
                    <button type="button" onclick="startHvHFromModal()" class="button"
                            style="margin:14px 0 0;width:100%;padding:16px;font-size:18px;font-weight:700;">
                        ▶ Spiel starten
                    </button>
                </div>

                <div class="modal-actions">
                    <button type="button" onclick="cancelHvHModal()"
                            class="back-button" style="margin:0; flex:1;">
                        Abbrechen
                    </button>
                </div>
            </div>
        </div>

        <!-- Chess Bot modal -->
        <div id="botModal" class="modal-overlay">
            <div class="modal-box">
                <h3 style="margin-top:0;">Gegen Bot spielen</h3>

                <div class="form-group">
                    <label>Spieler (für Stats)</label>
                    <div class="player-radio-grid" id="botPlayerProfile"></div>
                </div>

                <div class="form-group">
                    <label>Schwierigkeit</label>
                    <div class="option-group" id="botDiff">
                        <button type="button" class="toggle-btn" data-d="1">Einfach</button>
                        <button type="button" class="toggle-btn active" data-d="2">Mittel</button>
                        <button type="button" class="toggle-btn" data-d="3">Schwer</button>
                        <button type="button" class="toggle-btn" data-d="4">Experte</button>
                    </div>
                </div>

                <div class="form-group">
                    <label>Deine Farbe</label>
                    <div class="option-group" id="botColor">
                        <button type="button" class="toggle-btn active" data-color="white">Weiss</button>
                        <button type="button" class="toggle-btn" data-color="black">Schwarz</button>
                        <button type="button" class="toggle-btn" data-color="random">Zufall</button>
                    </div>
                </div>

                <div class="modal-actions">
                    <button type="button" onclick="cancelBotModal()"
                            class="back-button" style="margin:0; flex:1;">Abbrechen</button>
                    <button type="button" onclick="startBotFromModal()"
                            class="button" style="margin:0; flex:1;">Start</button>
                </div>
            </div>
        </div>

        <!-- Lichess modal -->
        <div id="lichessModal" class="modal-overlay">
            <div class="modal-box">
                <h3 style="margin-top:0;">Lichess starten</h3>
                <p class="text-muted" style="font-size:var(--fs-sm); margin-top:0;">
                    Verbindet zu Lichess.org. Der API-Token muss vorher
                    in den Einstellungen hinterlegt sein.
                </p>
                <div class="modal-actions">
                    <button type="button" onclick="cancelLichessModal()"
                            class="back-button" style="margin:0; flex:1;">Abbrechen</button>
                    <button type="button" onclick="startLichessFromModal()"
                            class="button" style="margin:0; flex:1;">Verbinden</button>
                </div>
            </div>
        </div>

    </main>
    <script>
        if (window.PC) PC.startWifiPill();

        let profilesCache = null;

        // Read/write helpers for either a <select> or a .player-radio-grid:
        // both targets get the same `value`-ish API so the rest of the modal
        // code stays unchanged.
        function _gridValue(grid) {
            const sel = grid.querySelector('input[type="radio"]:checked');
            return sel ? sel.value : '';
        }
        function _setGridValue(grid, id) {
            const r = grid.querySelector('input[type="radio"][value="' + id + '"]');
            if (!r) return;
            r.checked = true;
            grid.querySelectorAll('.player-radio-tile').forEach(t =>
                t.classList.toggle('active', t.contains(r)));
        }
        function getProfileSelection(elId) {
            const el = document.getElementById(elId);
            if (!el) return '';
            if (el.classList.contains('player-radio-grid')) return _gridValue(el);
            return el.value || '';
        }

        function loadProfiles(targetIds) {
            return fetch('./api/profiles')
                .then(r => r.ok ? r.json() : null)
                .then(json => {
                    profilesCache = json;
                    const list = (json && json.profiles) ? json.profiles : [];
                    const primaryRating = (p) => {
                        const r = p.ratings || {};
                        return (r.rapid  > 0) ? ['rapid',  r.rapid]  :
                               (r.blitz  > 0) ? ['blitz',  r.blitz]  :
                               (r.bullet > 0) ? ['bullet', r.bullet] :
                               (r.daily  > 0) ? ['daily',  r.daily]  :
                               (p.elo    > 0) ? ['rapid',  p.elo]    : null;
                    };
                    const fillSelect = (sel, idx) => {
                        sel.innerHTML = '<option value="">(kein Profil)</option>' +
                            list.map(p => {
                                const pr = primaryRating(p);
                                const eloLabel = pr
                                    ? '  [' + pr[0].toUpperCase() + ' ' + pr[1] + ']'
                                    : '';
                                return '<option value="' + p.id + '">' +
                                    (p.avatar || '♟') + '  ' + p.name + eloLabel + ' · ' +
                                    ((p.stats && p.stats.wins)   || 0) + '/' +
                                    ((p.stats && p.stats.losses) || 0) + '/' +
                                    ((p.stats && p.stats.draws)  || 0) +
                                    '</option>';
                            }).join('');
                        if (list.length > idx) sel.value = list[idx].id;
                    };
                    const escAttr = (s) => String(s)
                        .replace(/&/g,'&amp;').replace(/"/g,'&quot;');
                    const escText = (s) => String(s)
                        .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
                    const fillGrid = (grid, idx) => {
                        const name = grid.id + '_radio';
                        grid.innerHTML = list.map((p, i) => {
                            // Show the WIN/LOSS record stored on the board instead of an ELO.
                            const wins   = (p.stats && p.stats.wins)   || 0;
                            const losses = (p.stats && p.stats.losses) || 0;
                            const eloChip = '<span class="pr-meta">✓ ' + wins + ' · ✗ ' + losses + '</span>';
                            return (
                                '<label class="player-radio-tile' +
                                    (i === idx ? ' active' : '') + '">' +
                                    '<input type="radio" name="' + escAttr(name) +
                                        '" value="' + escAttr(p.id) + '"' +
                                        (i === idx ? ' checked' : '') + '>' +
                                    '<span class="pr-avatar" style="background:' +
                                        escAttr(p.color || 'var(--color-bg-elev-3)') + ';color:#fff;">' +
                                        escText(p.avatar || '♟') + '</span>' +
                                    '<span class="pr-text">' +
                                        '<span class="pr-name" style="display:flex;align-items:center;">' +
                                            '<span class="pr-colordot" style="background:' +
                                                escAttr(p.color || '#888') + ';"></span>' +
                                            escText(p.name) +
                                        '</span>' +
                                        eloChip +
                                    '</span>' +
                                '</label>'
                            );
                        }).join('');
                        grid.querySelectorAll('input[type="radio"]')
                            .forEach(r => r.addEventListener('change', () => {
                                grid.querySelectorAll('.player-radio-tile')
                                    .forEach(t => t.classList.toggle('active',
                                                                     t.contains(r) && r.checked));
                                if (grid.id === 'hvhP1' || grid.id === 'hvhP2') _syncHvHExclusivity();
                                // Wizard: collapse this picker to a compact chip and
                                // reveal the next step once a side is chosen.
                                if (grid.id === 'hvhP1') { _collapsePlayerStep('hvhStep1', 'hvhP1', 'hvhP1Summary'); _revealStep('hvhStep2'); }
                                if (grid.id === 'hvhP2') { _collapsePlayerStep('hvhStep2', 'hvhP2', 'hvhP2Summary'); _revealStep('hvhStep3'); }
                            }));
                    };
                    (targetIds || [['hvhP1', 0], ['hvhP2', 1]]).forEach(([id, i]) => {
                        const el = document.getElementById(id);
                        if (!el) return;
                        if (el.classList.contains('player-radio-grid')) fillGrid(el, i);
                        else                                            fillSelect(el, i);
                    });
                })
                .catch(() => {});
        }

        // Toggle-group helpers — single selection within each group.
        function wireToggleGroup(containerId) {
            document.querySelectorAll('#' + containerId + ' .toggle-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('#' + containerId + ' .toggle-btn')
                        .forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                });
            });
        }
        wireToggleGroup('hvhTime');
        wireToggleGroup('hvhColor');
        wireToggleGroup('botDiff');
        wireToggleGroup('botColor');

        // A player chosen for one side is disabled on the other side, so the same
        // profile can't be picked twice. If that disables a side's current choice,
        // it hops to the first still-available profile.
        function _syncHvHExclusivity() {
            const g1 = document.getElementById('hvhP1');
            const g2 = document.getElementById('hvhP2');
            if (!g1 || !g2) return;
            const apply = (grid, blockVal) => {
                const wasChecked = grid.querySelector('input[type="radio"]:checked');
                grid.querySelectorAll('.player-radio-tile').forEach(t => {
                    const input = t.querySelector('input[type="radio"]');
                    if (!input) return;
                    const dis = !!blockVal && input.value === blockVal;
                    input.disabled = dis;
                    t.classList.toggle('disabled', dis);
                });
                if (wasChecked && wasChecked.disabled) {
                    const firstFree = grid.querySelector('input[type="radio"]:not([disabled])');
                    if (firstFree) _setGridValue(grid, firstFree.value);
                }
            };
            apply(g2, _gridValue(g1));   // block P1's pick in P2
            apply(g1, _gridValue(g2));   // block P2's pick in P1
        }

        // Collapse a chosen player picker to a compact chip at the top.
        function _collapsePlayerStep(stepId, gridId, summaryId) {
            const step = document.getElementById(stepId);
            const grid = document.getElementById(gridId);
            const summary = document.getElementById(summaryId);
            if (!step || !grid || !summary) return;
            const tile = grid.querySelector('.player-radio-tile.active');
            if (!tile) return;
            const av  = tile.querySelector('.pr-avatar');
            const nm  = tile.querySelector('.pr-name');
            summary.innerHTML = '';
            const a = document.createElement('span');
            a.className = 'pr-avatar';
            a.style.background = av ? av.style.background : '#444';
            a.style.color = '#fff';
            a.textContent = av ? av.textContent : '♟';
            const n = document.createElement('span');
            n.className = 'hvh-summary-name';
            n.textContent = nm ? nm.textContent.trim() : '';
            const e = document.createElement('span');
            e.className = 'hvh-summary-edit';
            e.textContent = 'ändern ✎';
            summary.appendChild(a); summary.appendChild(n); summary.appendChild(e);
            step.classList.add('collapsed');
        }
        // Re-open a collapsed picker so the player can change their choice.
        function _editPlayerStep(stepId) {
            const step = document.getElementById(stepId);
            if (step) step.classList.remove('collapsed');
        }

        // Reveal a wizard step (Spieler 2, then the options + start) with a scroll.
        function _revealStep(id) {
            const el = document.getElementById(id);
            if (!el || el.classList.contains('revealed')) return;
            el.classList.add('revealed');
            setTimeout(function () { try { el.scrollIntoView({ behavior: 'smooth', block: 'nearest' }); } catch (_) {} }, 60);
        }

        function showHvHModal() {
            // Reset the wizard: only Spieler 1 visible (expanded), nothing pre-selected.
            ['hvhStep2', 'hvhStep3'].forEach(function (id) {
                const e = document.getElementById(id); if (e) e.classList.remove('revealed');
            });
            ['hvhStep1', 'hvhStep2'].forEach(function (id) {
                const e = document.getElementById(id); if (e) e.classList.remove('collapsed');
            });
            loadProfiles([['hvhP1', -1], ['hvhP2', -1]]).then(_syncHvHExclusivity);
            document.getElementById('hvhModal').classList.add('visible');
        }

        function cancelHvHModal() {
            document.getElementById('hvhModal').classList.remove('visible');
        }

        function showBotModal() {
            loadProfiles([['botPlayerProfile', 0]]);
            document.getElementById('botModal').classList.add('visible');
        }

        function cancelBotModal() {
            document.getElementById('botModal').classList.remove('visible');
        }

        function startBotFromModal() {
            const diff = document.querySelector('#botDiff .toggle-btn.active')?.dataset.d || '2';
            const choice = document.querySelector('#botColor .toggle-btn.active')?.dataset.color || 'white';
            let playerColor = choice;
            if (choice === 'random') playerColor = Math.random() < 0.5 ? 'white' : 'black';
            cancelBotModal();
            selectGame(2, { playerColor, difficulty: diff });
        }

        function showLichessModal() {
            document.getElementById('lichessModal').classList.add('visible');
        }

        function cancelLichessModal() {
            document.getElementById('lichessModal').classList.remove('visible');
        }

        function startLichessFromModal() {
            cancelLichessModal();
            selectGame(3);
        }

        function startHvHFromModal() {
            const p1 = getProfileSelection('hvhP1');
            const p2 = getProfileSelection('hvhP2');
            if (p1 && p2 && p1 === p2) {
                alert('Spieler 1 und Spieler 2 müssen unterschiedlich sein.');
                return;
            }
            const timeMs  = parseInt(
                document.querySelector('#hvhTime .toggle-btn.active')
                    ?.dataset.ms || '600000', 10);
            const choice = document.querySelector('#hvhColor .toggle-btn.active')
                            ?.dataset.color || 'random';

            let whiteId = p1, blackId = p2;
            if (choice === 'black') {
                whiteId = p2; blackId = p1;
            } else if (choice === 'random') {
                if (Math.random() < 0.5) { whiteId = p1; blackId = p2; }
                else                     { whiteId = p2; blackId = p1; }
            }

            cancelHvHModal();
            selectGame(1, { whiteId, blackId, timeMs });
        }

        function showBotConfig() {
            document.getElementById('botConfigPanel').classList.add('visible');
        }

        function hideBotConfig() {
            document.getElementById('botConfigPanel').classList.remove('visible');
        }

        function selectGame(mode, extra) {
            if (mode === 1 || mode === 2 || mode === 3 || mode === 4 || mode === 5) {
                requestBody = 'gamemode=' + mode;
                if (mode === 2 && extra) {
                    requestBody += '&playerColor=' + encodeURIComponent(extra.playerColor || 'white');
                    requestBody += '&difficulty='  + encodeURIComponent(extra.difficulty  || '2');
                }
                if (mode === 1 && extra) {
                    if (extra.whiteId) requestBody += '&whiteId=' + encodeURIComponent(extra.whiteId);
                    if (extra.blackId) requestBody += '&blackId=' + encodeURIComponent(extra.blackId);
                    if (extra.timeMs != null) requestBody += '&timeMs=' + encodeURIComponent(extra.timeMs);
                }
                if (mode === 5 && extra && extra.manual) requestBody += '&simManual=1';
                fetch('./gameselect', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded'
                    },
                    body: requestBody
                }).then(response => {
                    if (!response.ok) {
                        if (mode === 3) {
                            alert('Please configure your Lichess API token in the Home page settings first.');
                        } else {
                            alert('Failed to select game mode. Please try again.');
                        }
                        return;
                    }
                    return response.text();
                }).then(data => {
                    // Don't redirect for sensor test (mode 4) or simulation (mode 5)
                    // Auto-open the board view for any started game OR
                    // simulation. Sensor-Test (mode 4) keeps its own UX
                    // path — no automatic redirect since there's no live
                    // chess position to watch.
                    if (data && mode !== 4)
                        window.location.href = "./board.html";
                }).catch(error => {
                    console.error('Error:', error);
                    alert('Failed to select game mode. Please try again.');
                });
            } else {
                alert('This game mode doesn\'t exist!');
            }
        }
    </script>
</body>

</html>
